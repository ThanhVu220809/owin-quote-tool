name: Deploy to GitHub Pages

# 👤 HUMAN cần làm trước khi workflow chạy được:
#  1. Settings → Pages → Source = GitHub Actions.
#  2. Settings → Secrets and variables → Actions, thêm:
#       VITE_GOOGLE_CLIENT_ID, VITE_BACKEND_URL, VITE_SHARED_SECRET
#     (KHÔNG commit giá trị thật vào repo — secret được inject lúc build.)
#  3. Đặt biến BASE_PATH = "/<tên-repo>/" (Variables) nếu repo KHÁC 'owin-quote-tool'.
#  4. Khai Authorized JavaScript Origins (Google Cloud) = https://<user>.github.io
#     và Redirect URI khớp (TASK 5.1).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: owin-quote-tool
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: owin-quote-tool/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: ${{ vars.BASE_PATH || '/owin-quote-tool/' }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
          VITE_SHARED_SECRET: ${{ secrets.VITE_SHARED_SECRET }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: owin-quote-tool/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
