name: CI

on:
  push:
    branches: [main, full-reference-parity]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: owin-quote-tool
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: owin-quote-tool/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
